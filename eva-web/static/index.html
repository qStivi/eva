<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#181926" />
<title>Eva</title>
<style>
  :root {
    --bg: #181926; --panel: #1e2030; --panel2: #24273a;
    --text: #cad3f5; --muted: #8087a2; --accent: #c6a0f6; --accent2: #f5bde6;
    --user: #363a4f; --eva: #2a2d40;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    padding: 12px 16px; background: var(--panel);
    border-bottom: 1px solid #00000040; display: flex; align-items: center; gap: 10px;
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: #f38ba8; }
  header .dot.ok { background: #a6da95; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header h1 small { color: var(--muted); font-weight: 400; margin-left: 6px; }
  #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 78%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--user); border-bottom-right-radius: 4px; }
  .msg.eva  { align-self: flex-start; background: var(--eva); border-bottom-left-radius: 4px; border: 1px solid #ffffff10; }
  .msg.sys  { align-self: center; color: var(--muted); font-size: 13px; background: none; }
  .meta { align-self: flex-start; color: var(--accent); font-size: 12px; margin: -6px 0 2px 2px; opacity: .85; }
  .typing { align-self: flex-start; color: var(--muted); font-style: italic; }
  form { display: flex; gap: 8px; padding: 12px; background: var(--panel); border-top: 1px solid #00000040; }
  #box { flex: 1; resize: none; background: var(--panel2); color: var(--text);
         border: 1px solid #ffffff14; border-radius: 12px; padding: 10px 12px; font: inherit; max-height: 140px; }
  #box:focus { outline: none; border-color: var(--accent); }
  button { background: var(--accent); color: #1a1a2e; border: 0; border-radius: 12px;
           padding: 0 18px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="status"></span>
    <h1>Eva <small id="sub">connecting…</small></h1>
  </header>
  <div id="log"></div>
  <form id="form">
    <textarea id="box" rows="1" placeholder="Say something to Eva…" autofocus></textarea>
    <button id="send" type="submit">Send</button>
  </form>
<script>
const log = document.getElementById('log');
const box = document.getElementById('box');
const form = document.getElementById('form');
const sendBtn = document.getElementById('send');
const statusDot = document.getElementById('status');
const sub = document.getElementById('sub');

function add(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el;
}

async function health() {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    statusDot.classList.toggle('ok', !!d.letta);
    sub.textContent = d.letta ? 'online' : 'brain offline (start LM Studio)';
  } catch { sub.textContent = 'offline'; }
}

box.addEventListener('input', () => { box.style.height = 'auto'; box.style.height = box.scrollHeight + 'px'; });
box.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  const text = box.value.trim();
  if (!text) return;
  add('user', text);
  box.value = ''; box.style.height = 'auto';
  sendBtn.disabled = true;
  const typing = add('typing', 'Eva is thinking…');
  try {
    const r = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const d = await r.json();
    typing.remove();
    if (!r.ok) { add('sys', '⚠ ' + (d.error || ('HTTP ' + r.status))); }
    else {
      if (d.tools && d.tools.length) add('meta', '✎ memory updated (' + d.tools.join(', ') + ')');
      add('eva', d.reply);
    }
  } catch (err) {
    typing.remove();
    add('sys', '⚠ ' + err);
  } finally {
    sendBtn.disabled = false; box.focus(); health();
  }
});

health();
setInterval(health, 20000);
</script>
</body>
</html>
