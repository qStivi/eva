version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: character_companion
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"

volumes:
  postgres_data:
```

### 4. Workflow with Claude Code

**Best Practice**:
1. **You prepare**: Create folder structure, add docs, create starter files
2. **Claude Code builds**: Give it specific tasks referencing the docs
3. **You review**: Check the code, test it, adjust if needed
4. **Iterate**: Next task builds on previous work

**How to point Claude Code to docs**:
```
"Implement the FastAPI WebSocket conversation endpoint as described 
in docs/design-document.md under 'Phase 1'. Use the two-track memory 
architecture explained in docs/technical-architecture.html."
```

